<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Lost & Found Management System</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Campus Lost & Found Management System</h1>
      <p>Report lost and found items easily and track their status in one place.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2 id="formTitle">Submit Item Report</h2>
      <form id="itemForm">
        <input type="hidden" id="itemId" />

        <div class="form-grid">
          <div>
            <label for="title">Title</label>
            <input type="text" id="title" maxlength="100" required />
          </div>

          <div>
            <label for="category">Category</label>
            <select id="category" required>
              <option value="">Select category</option>
              <option value="Lost">Lost</option>
              <option value="Found">Found</option>
            </select>
          </div>

          <div class="full-width">
            <label for="description">Description</label>
            <textarea id="description" rows="4" maxlength="1000" required></textarea>
          </div>

          <div>
            <label for="location">Location</label>
            <input type="text" id="location" maxlength="100" required />
          </div>

          <div>
            <label for="item_date">Date</label>
            <input type="date" id="item_date" required />
          </div>

          <div>
            <label for="contact_info">Contact Information</label>
            <input type="text" id="contact_info" maxlength="100" required />
          </div>

          <div>
            <label for="status">Status</label>
            <select id="status" required>
              <option value="Active">Active</option>
              <option value="Claimed">Claimed</option>
              <option value="Resolved">Resolved</option>
            </select>
          </div>
        </div>

        <div class="button-row">
          <button type="submit" class="btn btn-primary">Save Report</button>
          <button type="button" id="cancelEditBtn" class="btn btn-secondary hidden">Cancel Edit</button>
        </div>
      </form>

      <p id="messageBox" class="message"></p>
    </section>

    <section class="card">
      <h2>Item Details</h2>
      <div id="itemDetails" class="details-box">
        <p>Select <strong>View Details</strong> on any item to display full information here.</p>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Lost Items</h2>
        <button class="btn btn-outline" onclick="loadItems('Lost')">Refresh Lost Items</button>
      </div>
      <div id="lostItems" class="item-list"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Found Items</h2>
        <button class="btn btn-outline" onclick="loadItems('Found')">Refresh Found Items</button>
      </div>
      <div id="foundItems" class="item-list"></div>
    </section>
  </main>
</body>
</html>
